<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videoscop</title>
  <link rel="icon" href="free-icon-vision-4233537.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="header__title">Videoscop</h1>

      <div class="header__video">
        <video id="webcam" class="header__webcam" width="400" height="300" autoplay></video>
        <canvas id="overlay" class="header__overlay" width="400" height="300"></canvas>
      </div>

      <button id="settings" class="header__settings-btn">
        <img src="about/gear.png" id="settings-img" class="header__settings-img" height="50" width="50" alt="Settings">
      </button>

      <nav class="header__nav" id="nav">
        <ul class="header__nav-list">
          <li class="header__nav-item">
              <img src="about/user.png" class="header__nav-icon" height="30" width="30" alt="Account">
              <a href="#" class="header__nav-link">Аккаунт</a>
          </li>
          <li class="header__nav-item">
            <img src="about/tosr72yyh1oa4we3m5ami5k3dge5.png" class="header__nav-icon" height="30" width="30" alt="About">
            <a href="#" class="header__nav-link">О нас</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main">
        <canvas id="eyes" class="main__eyes" width="150" height="110"></canvas>
        <button id="train" class="main__train-btn">Попробовать</button>
        <div id="target" class="main__target">
            <img src="about/free-icon-vision-4233537.png" class="main__target-img" height="70" width="70" alt="Target">
        </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.5.0"></script>
  <script src="clmtrackr.js"></script>
  <script src="main.js"></script>
</body>
</html>
